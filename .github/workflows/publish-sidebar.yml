name: Publish Sidebar

on:
  release:
    types: [published]

jobs:
  publish:
    if: github.repository == 'Catdaemon/pi-extensions' && startsWith(github.ref_name, 'pi-sidebar-v')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-package
        with:
          package-dir: packages/sidebar
          package-name: "@catdaemon/pi-sidebar"
          tag-prefix: pi-sidebar-v
