name: Publish agent-todos

on:
  release:
    types: [published]

jobs:
  publish:
    if: github.repository == 'Catdaemon/pi-extensions' && startsWith(github.ref_name, 'agent-todos-v')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-package
        with:
          package-dir: packages/todos
          package-name: @catdaemon/pi-agent-todos
          tag-prefix: agent-todos-v
