name: Publish code-intelligence

on:
  release:
    types: [published]

jobs:
  publish:
    if: github.repository == 'Catdaemon/pi-extensions' && startsWith(github.ref_name, 'code-intelligence-v')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-package
        with:
          package-dir: packages/code-intelligence
          package-name: "@catdaemon/pi-code-intelligence"
          tag-prefix: code-intelligence-v
