name: Publish web-tools

on:
  release:
    types: [published]

jobs:
  publish:
    if: github.repository == 'Catdaemon/pi-extensions' && startsWith(github.ref_name, 'web-tools-v')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: npm install -g npm@11.5.1 && npm --version
      - run: pnpm install --frozen-lockfile
      - name: Verify release tag matches package version
        run: |
          VERSION="web-tools-v$(node -p "require('./packages/web-tools/package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$VERSION" ]; then echo "Tag $GITHUB_REF_NAME does not match $VERSION" >&2; exit 1; fi
      - run: pnpm --filter @catdaemon/pi-web-tools run typecheck
      - run: pnpm --filter @catdaemon/pi-web-tools test
      - run: pnpm --filter @catdaemon/pi-web-tools run pack:dry-run
      - run: cd packages/web-tools && npm publish --provenance --access public
