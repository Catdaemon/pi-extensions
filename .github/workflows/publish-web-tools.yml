name: Publish web-tools

on:
  release:
    types: [published]

jobs:
  publish:
    if: github.repository == 'Catdaemon/pi-extensions' && startsWith(github.ref_name, 'web-tools-v')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-package
        with:
          package-dir: packages/web-tools
          package-name: @catdaemon/pi-web-tools
          tag-prefix: web-tools-v
